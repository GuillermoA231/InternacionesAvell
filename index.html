<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificación IEI — Hospital Avellaneda</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --azul:    #1a3a5c;
      --celeste: #2563eb;
      --gris:    #f4f7fb;
      --texto:   #1e293b;
      --muted:   #64748b;
      --borde:   #cbd5e1;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--gris);
      color: var(--texto);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      max-width: 420px;
      width: 100%;
      overflow: hidden;
    }

    .card-header {
      background: var(--azul);
      color: white;
      padding: 28px 32px 24px;
      text-align: center;
    }

    .hospital-tag {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 8px;
    }

    .card-header h1 {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.3;
    }

    .card-header p {
      font-size: 13px;
      opacity: 0.75;
      margin-top: 6px;
    }

    .card-body {
      padding: 28px 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* QR */
    .qr-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .qr-box {
      padding: 12px;
      border: 2px solid var(--borde);
      border-radius: 12px;
      background: white;
    }

    .qr-label {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    /* Botones */
    .btn-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 14px 20px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: var(--celeste);
      color: white;
    }
    .btn-primary:hover { opacity: 0.9; }

    .btn-secondary {
      background: white;
      color: var(--azul);
      border: 2px solid var(--borde);
    }
    .btn-secondary:hover { background: var(--gris); }

    /* Footer */
    .card-footer {
      border-top: 1px solid var(--borde);
      padding: 14px 32px;
      text-align: center;
    }

    .card-footer p {
      font-size: 11px;
      color: var(--muted);
    }

    /* Estado de permanencia */
    #portal-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      width: 100%;
    }

    .stayed-msg {
      background: #f0fdf4;
      border: 1px solid #86efac;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      color: #166534;
      text-align: center;
      width: 100%;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="card-header">
    <div class="hospital-tag">Hospital Avellaneda · SIPROSA</div>
    <h1>Verificación IEI</h1>
    <p>Informe Estadístico de Internaciones</p>
  </div>

  <div class="card-body">
    <div id="portal-content">

      <div class="qr-wrap">
        <div class="qr-box">
          <div id="qrcode"></div>
        </div>
        <p class="qr-label">Escaneá para acceder desde tu celular</p>
      </div>


    </div>
  </div>

  <div class="card-footer">
    <p>Estadísticas · Hospital de Clínicas Presidente Dr. Nicolás Avellaneda</p>
  </div>
</div>

<script>
  // Generar QR apuntando al redirect
  var BASE = window.location.href.replace(/\/[^\/]*$/, '');
  var QR_URL = BASE + '/redirect.html';

  new QRCode(document.getElementById('qrcode'), {
    text: QR_URL,
    width: 160,
    height: 160,
    colorDark: '#1a3a5c',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });

  function quedarse() {
    var stack = document.querySelector('.btn-stack');
    stack.innerHTML =
      '<div class="stayed-msg">Estás en el portal del sistema IEI.<br>Usá el QR o el botón de arriba para ingresar.</div>' +
      '<a href="redirect.html" class="btn btn-primary">Ingresar a la página</a>';
  }
</script>

</body>
</html>
